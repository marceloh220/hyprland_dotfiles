# -----------------------------------------------------
# Window rules
# -----------------------------------------------------

windowrule {
  name = windowrule-1
  tile = on
  match:title = ^(Microsoft-edge)$
}

windowrule {
  name = windowrule-2
  tile = on
  match:title = ^(Brave-browser)$
}

windowrule {
  name = windowrule-3
  tile = on
  match:title = ^(Chromium)$
}

windowrule {
  name = windowrule-4
  float = on
  match:title = ^(pavucontrol)$
}

windowrule {
  name = windowrule-5
  float = on
  match:title = ^(blueman-manager)$
}

windowrule {
  name = windowrule-6
  float = on
  match:title = ^(nm-connection-editor)$
}

windowrule {
  name = windowrule-7
  float = on
  match:title = ^(qalculate-gtk)$
}


# Browser Picture in Picture
windowrule {
  name = windowrule-8
  float = on
  pin = on
  move = ((monitor_w*0.695)) ((monitor_h*0.04))
  match:title = ^(Picture-in-Picture)$
}


# idleinhibit
windowrule {
  name = windowrule-9
  idle_inhibit = fullscreen
  fullscreen = on
  match:class = ([window]) # Available modes: none
}


# Pavucontrol floating
windowrule {
  name = windowrule-10
  float = on
  size = 700 600
  center = on
  pin = on
  match:class = (.*org.pulseaudio.pavucontrol.*)
}


# OpenAI ChatGPT floating
windowrule {
  name = windowrule-11
  float = on
  match:title = (ChatGPT.*)
}

windowrule {
  name = windowrule-12
  float = on
  size = 500 (monitor_h*0.5)
  move = (20) (70)
  match:title = (.*chat.openai.com.*)
}


# Waypaper
windowrule {
  name = windowrule-13
  float = on
  size = 900 700
  center = on
  pin = on
  match:class = (.*waypaper.*)
}


# SwayNC
layerrule {
  name = layerrule-1
  blur = on
  ignore_alpha = 0.5
  match:namespace = swaync-control-center
}

layerrule {
  name = layerrule-2
  blur = on
  ignore_alpha = 0.5
  match:namespace = swaync-notification-window
}


# ML4W Calendar floating
windowrule {
  name = windowrule-14
  float = on
  move = ((monitor_w*1)-window_w-16) (66)
  pin = on
  size = 400 400
  match:class = (com.ml4w.calendar)
}


# ML4W Sidebar floating
windowrule {
  name = windowrule-15
  float = on
  move = ((monitor_w*1)-window_w-16) (66)
  pin = on
  size = 400 740
  match:class = (com.ml4w.sidebar)
}


# ML4W Welcome App floating
windowrule {
  name = windowrule-16
  float = on
  size = 700 600
  center = on
  pin = on
  match:class = (com.ml4w.welcome)
}


# ML4W Settings App floating
windowrule {
  name = windowrule-17
  float = on
  size = 800 600
  move = ((monitor_w*0.1)) ((monitor_h*0.2))
  match:class = (com.ml4w.settings)
}


# Blueman Manager
windowrule {
  name = windowrule-18
  float = on
  size = 800 600
  center = on
  match:class = (blueman-manager)
}


# nwg-look
windowrule {
  name = windowrule-19
  float = on
  size = 700 600
  move = ((monitor_w*0.1)) ((monitor_h*0.2))
  pin = on
  match:class = (nwg-look)
}


# nwg-displays
windowrule {
  name = windowrule-20
  float = on
  size = 900 600
  move = ((monitor_w*0.1)) ((monitor_h*0.2))
  pin = on
  match:class = (nwg-displays)
}


# System Mission Center
windowrule {
  name = windowrule-21
  float = on
  pin = on
  center = on
  size = 900 600
  match:class = (io.missioncenter.MissionCenter)
}


# System Mission Center Preference Window
windowrule {
  name = windowrule-22
  float = on
  pin = on
  center = on
  match:class = (missioncenter)
  match:title = ^(Preferences)$
}


# Gnome Calculator
windowrule {
  name = windowrule-23
  float = on
  size = 700 600
  center = on
  match:class = (org.gnome.Calculator)
}


# Emoji Picker Smile
windowrule {
  name = windowrule-24
  float = on
  pin = on
  move = ((monitor_w*1)-window_w-40) (90)
  match:class = (it.mijorus.smile)
}


# Hyprland Share Picker
windowrule {
  name = windowrule-25
  float = on
  pin = on
  size = 600 400
  match:class = (hyprland-share-picker)
}

windowrule {
  name = windowrule-26
  center = on
  match:title = class:(hyprland-share-picker)
}


# General floating
windowrule {
  name = windowrule-27
  float = on
  size = 1000 800
  center = on
  match:class = (dotfiles-floating)
}


# Showcase window
windowrule {
  name = windowrule-28
  float = on
  opacity = .8
  pin = on
  size = 1000 550
  move = (monitor_w-window_w-3) (monitor_h-window_h-3)
  match:class = (showcase)
}


# Private window
windowrule {
  name = windowrule-29
  no_screen_share = on
  match:class = (private)
}


# Floating for Ghostty
windowrule {
  name = windowrule-30
  float = on
  size = 1000 700
  center = on
  pin = on
  match:class = (ml4w.dotfiles.floating)
}
